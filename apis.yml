  - type: Features
    data:
      - name: Integrated Luxury Resorts
        description: Operates five integrated luxury resort destinations spanning Las Vegas, Boston Harbor, Macau, Cotai, and Mayfair, with another property under development on Al Marjan Island.
      - name: Casino Gaming
        description: Full-service casino gaming experiences across all flagship properties, including table games, slots, and high-limit gaming salons.
      - name: Hotel Accommodations
        description: 9,667 luxury rooms and suites across the portfolio, including Forbes Five-Star recognized accommodations.
      - name: Fine Dining
        description: 81 restaurants across the portfolio, ranging from Michelin-recognized fine dining to casual eateries and lounges.
      - name: Luxury Retail
        description: 200 luxury retail outlets featuring designer boutiques, jewelry, fashion, and lifestyle brands within the resort properties.
      - name: Spa and Wellness
        description: Forbes Five-Star spas and wellness centers offering treatments, fitness, and salon services to guests.
      - name: Meetings and Conventions
        description: Meeting, convention, and event spaces designed to host corporate gatherings, weddings, and large-scale events.
      - name: Entertainment and Nightlife
        description: Live entertainment, nightclubs, dayclubs, and theater productions across resort properties.
      - name: Five-Star Service
        description: Holder of 22 Forbes Five-Star Awards, more than any other independent hotel company in the world.
  - type: UseCases
    data:
      - name: Luxury Travel and Leisure
        description: Travelers seeking luxury accommodations, dining, and entertainment for vacations and getaways.
      - name: Corporate Meetings and Events
        description: Companies hosting conferences, sales meetings, training events, and incentive trips at Wynn convention spaces.
      - name: Weddings and Celebrations
        description: Couples and families hosting weddings, anniversaries, and milestone celebrations at Wynn properties.
      - name: Casino Gaming and VIP Hospitality
        description: Casino patrons and VIP guests engaging with table games, slots, and curated high-limit experiences.
      - name: Fine Dining and Culinary Experiences
        description: Diners visiting Wynn properties for award-winning restaurants, chef's tables, and tasting menus.
      - name: Designer Retail Shopping
        description: Shoppers visiting the luxury esplanades and boutiques located within Wynn resort properties.
      - name: Spa, Wellness, and Beauty
        description: Guests booking spa treatments, fitness, salon services, and wellness experiences.
      - name: Investor Relations and Reporting
        description: Investors, analysts, and financial stakeholders accessing Wynn Resorts financial reports, SEC filings, and corporate governance information.
  - type: Integrations
    data:
      - name: Wynn Las Vegas
        description: Flagship Las Vegas property combining Wynn and Encore towers with 4,748 rooms, casino, dining, and retail.
      - name: Encore Boston Harbor
        description: Resort and casino in Everett, Massachusetts with 671 rooms on the Mystic River waterfront.
      - name: Wynn Macau and Encore Macau
        description: Integrated resort in Macau SAR offering 1,010 rooms and suites with casino, dining, and retail.
      - name: Wynn Palace Cotai
        description: Cotai Strip integrated resort with 1,706 rooms, suites, and villas, plus performance lake and SkyCab.
      - name: Wynn Mayfair
        description: London gaming and dining club expanding the Wynn brand into the United Kingdom market.
      - name: Wynn Al Marjan Island
        description: Integrated resort under development on Al Marjan Island, Ras Al Khaimah, UAE, scheduled to open Spring 2027.
      - name: Wynn Design and Development
        description: In-house design and development arm responsible for the design, construction, and renovation of Wynn properties.
      - name: Wynn Aviation
        description: Aviation services arm supporting executive and guest travel across the Wynn property portfolio.
  - type: Solutions
    data:
      - name: Hospitality and Lodging
        description: Hotel rooms, suites, villas, and serviced accommodations across the integrated resort portfolio.
      - name: Gaming and Casino
        description: Casino floor operations, table games, slots, sportsbook, and high-limit gaming experiences.
      - name: Food and Beverage
        description: Restaurants, lounges, bars, in-room dining, and catering operations across all resort properties.
      - name: Retail
        description: Curated luxury retail boutiques and brand partnerships operated within Wynn resort esplanades.
      - name: Entertainment and Nightlife
        description: Concert venues, nightclubs, dayclubs, theater shows, and special event programming.
      - name: Meetings, Incentives, Conferences, and Events
        description: Convention, meeting, and event hosting solutions ranging from boardrooms to large-scale ballrooms.
      - name: Spa, Salon, and Wellness
        description: Spa treatments, fitness facilities, salons, and curated wellness programs.
      - name: ESG and Responsibility
        description: Environmental, social, and governance programs covering responsible gaming, sustainability, and community engagement.
description: >-
  Wynn Resorts is a developer, owner, and operator of integrated luxury resorts and
  casinos, with properties in Las Vegas, Boston Harbor, and Macau. The company does
  not currently publish a public developer portal or API documentation.
